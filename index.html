<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logisztikai városépítő</title>
<style>
  html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
  }
  #game {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// ===== ALAP BEÁLLÍTÁS =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  setupWorld();
}
window.addEventListener("resize", resize);
resize();

// ===== ADATOK =====
const resources = {
  wood:{name:"Fa",stock:200},
  stone:{name:"Kő",stock:150},
  iron:{name:"Vasérc",stock:120},
  steel:{name:"Acél",stock:0}
};

const buildings = [
  {id:"house",name:"Lakóház",need:{wood:40,stone:20},have:{},built:false,x:0,y:0},
  {id:"warehouse",name:"Raktár",need:{wood:30,iron:20},have:{},built:false,x:0,y:0},
  {id:"steelMill",name:"Acélmű",need:{iron:50},have:{},built:false,x:0,y:0},
  {id:"hospital",name:"Kórház",need:{steel:30,stone:30},have:{},built:false,x:0,y:0}
];

const vehicles = [
  {type:"train",name:"Vonat",emoji:"🚂",capacity:20,cargo:{},stops:[],index:0,dir:1,speed:2,x:0,y:0},
  {type:"ship", name:"Hajó", emoji:"🚢",capacity:25,cargo:{},stops:[],index:0,dir:1,speed:1.5,x:0,y:0},
  {type:"plane",name:"Repülő",emoji:"✈️",capacity:8,cargo:{},stops:[],index:0,dir:1,speed:3,x:0,y:0}
];

let stopsTrain=[],stopsShip=[],stopsPlane=[];
let trackY,waterY,airY;

let selectedBuilding=null;
let selectedVehicle=null;
let selectedResource=null;
let selectedAmount=0;

const buttons=[];

// ===== VILÁG ELRENDEZÉSE =====
function setupWorld() {
  const w=canvas.width;
  const h=canvas.height;

  const topH=h*0.35;
  const laneH=(h-topH)/3;

  airY   = topH+laneH*0.5;
  trackY = topH+laneH*1.5;
  waterY = topH+laneH*2.5;

  stopsTrain=[]; stopsShip=[]; stopsPlane=[];
  for(let i=0;i<4;i++){
    const x=w*0.15+i*(w*0.25);
    stopsTrain.push({x,y:trackY});
    stopsShip.push({x,y:waterY});
    stopsPlane.push({x,y:airY});
  }

  vehicles[0].y=trackY;  vehicles[0].stops=stopsTrain;  vehicles[0].index=0; vehicles[0].x=stopsTrain[0].x;
  vehicles[1].y=waterY;  vehicles[1].stops=stopsShip;   vehicles[1].index=0; vehicles[1].x=stopsShip[0].x;
  vehicles[2].y=airY;    vehicles[2].stops=stopsPlane;  vehicles[2].index=0; vehicles[2].x=stopsPlane[0].x;

  const cx=w*0.5;
  const cy=topH*0.5;
  const dx=w*0.25;
  const dy=topH*0.25;

  buildings[0].x=cx-dx; buildings[0].y=cy-dy;
  buildings[1].x=cx+dx; buildings[1].y=cy-dy;
  buildings[2].x=cx-dx; buildings[2].y=cy+dy;
  buildings[3].x=cx+dx; buildings[3].y=cy+dy;
}

// ===== MOZGÁS + SZÁLLÍTÁS =====
function moveVehicles(){
  vehicles.forEach(v=>{
    const t=v.stops[v.index];
    const dx=t.x-v.x;
    const dist=Math.abs(dx);

    if(dist<2){
      v.index+=v.dir;
      if(v.index>=v.stops.length){
        v.index=v.stops.length-2;
        v.dir=-1;
      } else if(v.index<0){
        v.index=1;
        v.dir=1;
      }
    } else {
      v.x+=v.speed*Math.sign(dx);
    }

    buildings.forEach(b=>{
      if(Math.hypot(v.x-b.x,v.y-b.y)<40){
        deliverCargo(v,b);
      }
    });
  });
}

function deliverCargo(v,b){
  if(!selectedBuilding||b.id!==selectedBuilding.id)return;

  for(const k in v.cargo){
    b.have[k]=(b.have[k]||0)+v.cargo[k];
  }
  v.cargo={};

  let ready=true;
  for(const k in b.need){
    if((b.have[k]||0)<b.need[k])ready=false;
  }
  if(ready){
    b.built=true;
    if(b.id==="steelMill")resources.steel.stock+=50;
  }
}

function loadCargo(){
  if(!selectedBuilding||!selectedVehicle||!selectedResource)return;
  if(selectedAmount<=0)return;

  const res=resources[selectedResource];
  if(res.stock<=0)return;

  let sum=0; for(const k in selectedVehicle.cargo) sum+=selectedVehicle.cargo[k];
  let free=selectedVehicle.capacity-sum;
  if(free<=0)return;

  let amount=Math.min(selectedAmount,res.stock,free);
  if(amount<=0)return;

  res.stock-=amount;
  selectedVehicle.cargo[selectedResource]=(selectedVehicle.cargo[selectedResource]||0)+amount;
  selectedAmount=0;
}

// ===== RAJZOLÁS =====
function draw(){
  const w=canvas.width;
  const h=canvas.height;
  const topH=h*0.35;
  const laneH=(h-topH)/3;
  const hudY=h*0.55;

  ctx.clearRect(0,0,w,h);

  // felső város
  ctx.fillStyle="#123";
  ctx.fillRect(0,0,w,topH);

  // épületek
  buildings.forEach(b=>{
    ctx.fillStyle=b.built?"#4caf50":"#ccc";
    ctx.fillRect(b.x-35,b.y-35,70,70);
    ctx.fillStyle="#000";
    ctx.fillRect(b.x-33,b.y-33,66,66);
    ctx.fillStyle="#fff";
    ctx.font="12px sans-serif";
    ctx.fillText(b.name,b.x-30,b.y);
  });

  // légi sáv
  ctx.fillStyle="#001a33";
  ctx.fillRect(0,topH,w,laneH);

  // vasút
  ctx.fillStyle="#222";
  ctx.fillRect(0,topH+laneH,w,laneH);
  ctx.strokeStyle="#666";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(0,trackY);
  ctx.lineTo(w,trackY);
  ctx.stroke();
  ctx.lineWidth=1;
  for(let i=0;i<w;i+=20){
    ctx.beginPath();
    ctx.moveTo(i,trackY-6);
    ctx.lineTo(i,trackY+6);
    ctx.stroke();
  }

  // víz
  ctx.fillStyle="#003366";
  ctx.fillRect(0,topH+laneH*2,w,laneH);
  ctx.fillStyle="#005599";
  ctx.fillRect(0,waterY-3,w,6);

  // megállók
  function drawStops(stops,color){
    ctx.fillStyle=color;
    stops.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x,s.y,6,0,Math.PI*2);
      ctx.fill();
    });
  }
  drawStops(stopsPlane,"#fff");
  drawStops(stopsTrain,"#ff0");
  drawStops(stopsShip,"#0ff");

  // járművek
  ctx.font="40px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  vehicles.forEach(v=>{
    ctx.fillText(v.emoji,v.x,v.y);
  });

  // HUD
  ctx.fillStyle="#111";
  ctx.fillRect(0,hudY,w,h-hudY);
  buttons.length=0;

  let y=hudY+5;
  const lineH=24;

  // épület választás
  ctx.fillStyle="#fff";
  ctx.font="14px sans-serif";
  ctx.fillText("Épület:",w*0.5,y);
  y+=lineH;

  const bw=w/2-10, bh=26;
  buildings.forEach((b,i)=>{
    const bx=(i%2===0)?5:w/2+5;
    const by=y+Math.floor(i/2)*(bh+4);
    ctx.fillStyle=(selectedBuilding&&selectedBuilding.id===b.id)?"#666":"#333";
    ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle="#fff";
    ctx.font="11px sans-serif";
    let txt=b.name+(b.built?" ✔":"");
    ctx.fillText(txt,bx+5,by+bh/2+3);
    buttons.push({type:"building",id:b.id,x:bx,y:by,w:bw,h:bh});
  });
  y+=Math.ceil(buildings.length/2)*(bh+4)+4;

  // jármű választás
  ctx.fillStyle="#fff";
  ctx.font="14px sans-serif";
  ctx.fillText("Jármű:",w*0.5,y);
  y+=lineH;

  const vw=(w-20)/3, vh=28;
  vehicles.forEach((v,i)=>{
    const vx=5+i*(vw+5);
    const vy=y;
    ctx.fillStyle=(selectedVehicle&&selectedVehicle.type===v.type)?"#666":"#333";
    ctx.fillRect(vx,vy,vw,vh);
    ctx.fillStyle="#fff";
    ctx.font="11px sans-serif";
    ctx.fillText(v.emoji+" "+v.name,vx+vw/2,vy+vh/2+3);
    buttons.push({type:"vehicle",id:v.type,x:vx,y:vy,w:vw,h:vh});
  });
  y+=vh+6;

  // alapanyag
  ctx.fillStyle="#fff";
  ctx.font="14px sans-serif";
  ctx.fillText("Alapanyag:",w*0.5,y);
  y+=lineH;

  const keys=Object.keys(resources);
  const rw=(w-20)/keys.length, rh=24;
  keys.forEach((k,i)=>{
    const rx=5+i*(rw+5);
    const ry=y;
    ctx.fillStyle=(selectedResource===k)?"#666":"#333";
    ctx.fillRect(rx,ry,rw,rh);
    ctx.fillStyle="#fff";
    ctx.font="11px sans-serif";
    ctx.fillText(resources[k].name,rx+rw/2,ry+rh/2+3);
    buttons.push({type:"resource",id:k,x:rx,y:ry,w:rw,h:rh});
  });
  y+=rh+4;

  // készlet
  ctx.fillStyle="#ccc";
  ctx.font="11px sans-serif";
  const stockText=keys.map(k=>`${resources[k].name}:${resources[k].stock}`).join("  ");
  ctx.fillText(stockText,w*0.5,y);
  y+=lineH;

  // mennyiség
  ctx.fillStyle="#fff";
  ctx.font="14px sans-serif";
  ctx.fillText("Mennyiség:",w*0.5,y);
  y+=lineH;

  const amounts=[1,5,10,20];
  const aw=(w-20)/amounts.length, ah=24;
  amounts.forEach((n,i)=>{
    const ax=5+i*(aw+5);
    const ay=y;
    ctx.fillStyle="#333";
    ctx.fillRect(ax,ay,aw,ah);
    ctx.fillStyle="#fff";
    ctx.font="11px sans-serif";
    ctx.fillText("+"+n,ax+aw/2,ay+ah/2+3);
    buttons.push({type:"amount",value:n,x:ax,y:ay,w:aw,h:ah});
  });
  y+=ah+4;

  ctx.fillStyle="#ccc";
  ctx.font="11px sans-serif";
  ctx.fillText("Kiválasztott mennyiség: "+selectedAmount,w*0.5,y);
  y+=lineH;

  // szállítás gomb
  const sw=w*0.6, sh=30, sx=(w-sw)/2, sy=y;
  ctx.fillStyle="#880000";
  ctx.fillRect(sx,sy,sw,sh);
  ctx.fillStyle="#fff";
  ctx.font="13px sans-serif";
  ctx.fillText("Szállítás indítása",sx+sw/2,sy+sh/2+4);
  buttons.push({type:"send",x:sx,y:sy,w:sw,h:sh});
  y+=sh+4;

  // státusz
  ctx.fillStyle="#ccc";
  ctx.font="11px sans-serif";
  let status="Épület: "+(selectedBuilding?selectedBuilding.name:"nincs")+
             "   Jármű: "+(selectedVehicle?selectedVehicle.name:"nincs")+
             "   Anyag: "+(selectedResource?resources[selectedResource].name:"nincs");
  ctx.fillText(status,w*0.5,y);
}

// ===== KATTINTÁS =====
function handleClick(ev){
  const rect=canvas.getBoundingClientRect();
  const x=ev.clientX-rect.left;
  const y=ev.clientY-rect.top;

  for(const b of buttons){
    if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h){
      if(b.type==="building"){
        selectedBuilding=buildings.find(bb=>bb.id===b.id)||null;
      } else if(b.type==="vehicle"){
        selectedVehicle=vehicles.find(v=>v.type===b.id)||null;
      } else if(b.type==="resource"){
        selectedResource=b.id;
        selectedAmount=0;
      } else if(b.type==="amount"){
        selectedAmount+=b.value;
      } else if(b.type==="send"){
        loadCargo();
      }
      break;
    }
  }
}
canvas.addEventListener("click",handleClick);
canvas.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  handleClick(t);
  e.preventDefault();
},{passive:false});

// ===== FŐ CIKLUS =====
function loop(){
  moveVehicles();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
